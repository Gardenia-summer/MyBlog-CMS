<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的文章</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<main class="page">
    <header class="site-header">
        <a class="brand" th:href="@{/}">我的博客</a>
        <nav class="nav">
            <a th:href="@{/}">首页</a>
            <a th:href="@{/me/articles/new}">发布文章</a>
            <form th:action="@{/logout}" method="post"><button class="link-action" type="submit">退出</button></form>
        </nav>
    </header>

    <h1>我的文章</h1>
    <p class="error" th:if="${error}" th:text="${error}">操作失败</p>
    <section class="article-list" th:if="${!articlePage.empty}">
        <article class="article-item admin-item" th:each="article : ${articlePage.content}">
            <div>
                <a class="article-title" th:href="@{/articles/{id}(id=${article.id})}" th:text="${article.title}">文章标题</a>
                <div class="meta">
                    <span th:text="${article.category.name}">分类</span>
                    <time th:text="${#temporals.format(article.createdAt, 'yyyy-MM-dd HH:mm')}">时间</time>
                </div>
            </div>
            <div class="actions">
                <a class="button secondary" th:href="@{/me/articles/{id}/edit(id=${article.id})}">编辑</a>
                <form th:action="@{/me/articles/{id}/delete(id=${article.id})}" method="post">
                    <button class="danger" type="submit">删除</button>
                </form>
            </div>
        </article>
    </section>
    <p class="empty" th:if="${articlePage.empty}">你还没有发布文章。</p>
</main>
</body>
</html>
