<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人资料</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<main class="page">
    <header class="site-header">
        <div class="brand-area">
            <a class="brand" th:href="@{/}">我的博客</a>
        </div>
        <nav class="nav">
            <a th:href="@{/}">首页</a>
            <a th:href="@{/me/articles}">我的文章</a>
        </nav>
    </header>

    <section class="form-panel profile-panel">
        <div class="profile-summary">
            <img th:if="${!#strings.isEmpty(currentUser.avatarUrl)}" class="profile-avatar" th:src="@{${currentUser.avatarUrl}}" alt="">
            <span th:if="${#strings.isEmpty(currentUser.avatarUrl)}" class="profile-avatar avatar-placeholder" th:text="${#strings.substring(currentUser.nickname, 0, 1)}">U</span>
            <div>
                <h1>个人资料</h1>
                <p class="empty">用户名：<span th:text="${currentUser.username}">username</span></p>
                <p class="empty">昵称：<span th:text="${currentUser.nickname}">nickname</span></p>
                <p class="empty">简介：<span th:text="${currentUser.bio}">这个用户很懒~什么都没有写~</span></p>
            </div>
        </div>

        <p class="success" th:if="${message}" th:text="${message}">资料已更新</p>
        <p class="error" th:if="${error}" th:text="${error}">更新失败</p>

        <form class="avatar-form" th:action="@{/me/profile/nickname}" method="post">
            <label>修改昵称
                <input type="text" name="nickname" maxlength="80" th:value="${currentUser.nickname}" required>
            </label>
            <p class="empty">登录用户名不变，博客作者和评论会显示这个昵称。</p>
            <button type="submit">保存昵称</button>
        </form>

        <form class="avatar-form" th:action="@{/me/profile/bio}" method="post">
            <label>修改简介
                <textarea name="bio" rows="5" maxlength="300" required th:text="${currentUser.bio}">这个用户很懒~什么都没有写~</textarea>
            </label>
            <p class="empty">最多 300 字，只在“我的/个人资料”里展示。</p>
            <button type="submit">保存简介</button>
        </form>

        <form class="avatar-form" th:action="@{/me/profile/avatar}" method="post" enctype="multipart/form-data">
            <label>更换头像
                <input type="file" name="avatar" accept="image/jpeg,image/png,image/gif" required>
            </label>
            <p class="empty">支持 JPG、PNG、GIF，最大 2MB。</p>
            <button type="submit">保存头像</button>
        </form>
    </section>
</main>
</body>
</html>
