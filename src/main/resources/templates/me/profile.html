<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人资料</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<main class="page">
    <header class="site-header">
        <div class="brand-area">
            <a class="brand" th:href="@{/}">我的博客</a>
            <a class="user-chip" th:href="@{/me/profile}" aria-label="个人资料">
                <img th:if="${!#strings.isEmpty(currentUser.avatarUrl)}" class="avatar" th:src="@{${currentUser.avatarUrl}}" alt="">
                <span th:if="${#strings.isEmpty(currentUser.avatarUrl)}" class="avatar avatar-placeholder" th:text="${#strings.substring(currentUser.username, 0, 1)}">U</span>
                <span class="user-chip-name" th:text="${currentUser.username}">用户</span>
            </a>
        </div>
        <nav class="nav">
            <a th:href="@{/}">首页</a>
            <a th:href="@{/me/articles}">我的文章</a>
            <form th:action="@{/logout}" method="post"><button class="link-action" type="submit">退出</button></form>
        </nav>
    </header>

    <section class="form-panel profile-panel">
        <div class="profile-summary">
            <img th:if="${!#strings.isEmpty(currentUser.avatarUrl)}" class="profile-avatar" th:src="@{${currentUser.avatarUrl}}" alt="">
            <span th:if="${#strings.isEmpty(currentUser.avatarUrl)}" class="profile-avatar avatar-placeholder" th:text="${#strings.substring(currentUser.username, 0, 1)}">U</span>
            <div>
                <h1>个人资料</h1>
                <p class="empty" th:text="${currentUser.username}">用户名</p>
            </div>
        </div>

        <p class="success" th:if="${message}" th:text="${message}">头像已更新</p>
        <p class="error" th:if="${error}" th:text="${error}">上传失败</p>

        <form class="avatar-form" th:action="@{/me/profile/avatar}" method="post" enctype="multipart/form-data">
            <label>更换头像
                <input type="file" name="avatar" accept="image/jpeg,image/png,image/gif" required>
            </label>
            <p class="empty">支持 JPG、PNG、GIF，最大 2MB。</p>
            <button type="submit">保存头像</button>
        </form>
    </section>
</main>
</body>
</html>
