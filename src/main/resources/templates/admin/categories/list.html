<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类管理</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<main class="page">
    <header class="site-header">
        <a class="brand" th:href="@{/admin/articles}">后台管理</a>
        <nav class="nav admin-nav">
            <a th:href="@{/admin/articles}">文章</a>
            <a th:href="@{/admin/users}">用户</a>
            <a th:href="@{/admin/comments}">评论</a>
            <a th:href="@{/admin/categories}">分类</a>
            <a th:href="@{/admin/tags}">标签</a>
        </nav>
    </header>
    <h1>分类管理</h1>
    <p class="error" th:if="${error}" th:text="${error}">无法删除</p>
    <script th:if="${error}" th:inline="javascript">
        alert([[${error}]]);
    </script>
    <form class="inline-form" th:action="@{/admin/categories}" method="post">
        <input type="text" name="name" placeholder="新分类名称" required>
        <button type="submit">新增分类</button>
    </form>
    <section class="table-list">
        <article class="row-item" th:each="category : ${categories}">
            <span class="taxonomy-name" th:text="${category.name}">分类名称</span>
            <form th:action="@{/admin/categories/{id}/delete(id=${category.id})}" method="post">
                <button class="danger" type="submit">删除</button>
            </form>
        </article>
    </section>
</main>
</body>
</html>
