<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<main class="auth-page">
    <form class="form-panel" th:action="@{/admin/login}" method="post">
        <h1>管理员登录</h1>
        <p class="error" th:if="${error}" th:text="${error}">登录失败</p>
        <label>用户名<input type="text" name="username" required autocomplete="username"></label>
        <label>密码<input type="password" name="password" required autocomplete="current-password"></label>
        <button type="submit">登录后台</button>
        <a th:href="@{/login}">普通用户登录</a>
    </form>
</main>
</body>
</html>
