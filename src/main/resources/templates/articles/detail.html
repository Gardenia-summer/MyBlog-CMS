<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${article.title}">文章详情</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<main class="page">
    <header class="site-header">
        <div class="brand-area">
            <a class="brand" th:href="${currentUser != null and currentUser.role.name() == 'ADMIN'} ? @{/admin/articles} : @{/}">我的博客</a>
        </div>
        <nav class="nav">
            <a th:if="${currentUser == null or currentUser.role.name() == 'USER'}" th:href="@{/}">首页</a>
            <a th:if="${currentUser != null and currentUser.role.name() == 'ADMIN'}" th:href="@{/admin/articles}">后台</a>
            <a th:if="${currentUser != null and currentUser.role.name() == 'USER'}" th:href="@{/me/articles}">我的</a>
            <a th:if="${currentUser == null}" th:href="@{/login}">登录</a>
        </nav>
    </header>

    <article class="article-detail">
        <h1 th:text="${article.title}">文章标题</h1>
        <div class="meta">
            <a th:if="${article.author.role.name() == 'USER'}" th:href="@{/users/{id}(id=${article.author.id})}" th:text="${article.author.nickname}">作者</a>
            <span th:if="${article.author.role.name() != 'USER'}" th:text="${article.author.nickname}">作者</span>
            <span th:text="${article.category.name}">分类</span>
            <time th:text="${#temporals.format(article.createdAt, 'yyyy-MM-dd HH:mm')}">时间</time>
        </div>
        <div class="tag-row">
            <a th:each="tag : ${article.tags}" th:href="@{/(tagId=${tag.id})}" th:text="${tag.name}">标签</a>
        </div>
        <div class="content" th:text="${article.content}">正文</div>
        <div class="article-like-panel">
            <form th:if="${currentUser != null and currentUser.role.name() == 'USER'}" th:action="@{/articles/{id}/like(id=${article.id})}" method="post">
                <button class="like-button" th:classappend="${likedByCurrentUser} ? ' liked'" type="submit" th:attr="aria-pressed=${likedByCurrentUser},aria-label=${likedByCurrentUser} ? '取消点赞' : '点赞'">
                    <span aria-hidden="true">&#128077;</span>
                    <span th:text="${article.likeCount}">0</span>
                </button>
            </form>
            <a class="like-login" th:if="${currentUser == null}" th:href="@{/login}">
                <span aria-hidden="true">&#128077;</span>
                <span th:text="${article.likeCount}">0</span>
                <span>登录后点赞</span>
            </a>
            <span class="like-count like-detail" th:if="${currentUser != null and currentUser.role.name() == 'ADMIN'}"><span aria-hidden="true">&#128077;</span><span th:text="${article.likeCount}">0</span></span>
        </div>
    </article>

    <section class="comments">
        <h2>评论</h2>
        <p class="error" th:if="${error}" th:text="${error}">评论不能为空</p>
        <form class="comment-form" th:if="${currentUser != null and currentUser.role.name() == 'USER'}" th:action="@{/articles/{id}/comments(id=${article.id})}" method="post">
            <textarea name="content" rows="4" placeholder="写下你的评论" required></textarea>
            <button type="submit">发表评论</button>
        </form>
        <p th:if="${currentUser == null}"><a th:href="@{/login}">登录后评论</a></p>

        <article class="comment-item" th:each="comment : ${comments}">
            <div class="comment-row">
                <a th:if="${comment.author.role.name() == 'USER'}" th:href="@{/users/{id}(id=${comment.author.id})}" aria-label="查看用户主页">
                    <img th:if="${!#strings.isEmpty(comment.author.avatarUrl)}" class="avatar avatar-small" th:src="@{${comment.author.avatarUrl}}" alt="">
                    <span th:if="${#strings.isEmpty(comment.author.avatarUrl)}" class="avatar avatar-small avatar-placeholder" th:text="${#strings.substring(comment.author.nickname, 0, 1)}">U</span>
                </a>
                <div class="comment-body">
                    <div class="meta">
                        <a th:if="${comment.author.role.name() == 'USER'}" th:href="@{/users/{id}(id=${comment.author.id})}" th:text="${comment.author.nickname}">用户</a>
                        <span th:if="${comment.author.role.name() != 'USER'}" th:text="${comment.author.nickname}">用户</span>
                        <time th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">时间</time>
                    </div>
                    <p th:text="${comment.content}">评论内容</p>
                </div>
            </div>
        </article>
        <p class="empty" th:if="${comments.isEmpty()}">暂无评论。</p>
    </section>
</main>
</body>
</html>
