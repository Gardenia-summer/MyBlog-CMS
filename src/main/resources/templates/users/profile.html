<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${profileUser.nickname} + '的主页'">用户主页</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<main class="page">
    <header class="site-header">
        <div class="brand-area">
            <a class="brand" th:href="${currentUser != null and currentUser.role.name() == 'ADMIN'} ? @{/admin/articles} : @{/}">我的博客</a>
        </div>
        <nav class="nav">
            <a th:if="${currentUser == null or currentUser.role.name() == 'USER'}" th:href="@{/}">首页</a>
            <a th:if="${currentUser != null and currentUser.role.name() == 'ADMIN'}" th:href="@{/admin/articles}">后台</a>
            <a th:if="${currentUser != null and currentUser.role.name() == 'USER'}" th:href="@{/me/articles}">我的</a>
            <a th:if="${currentUser == null}" th:href="@{/login}">登录</a>
            <a th:if="${currentUser == null}" th:href="@{/register}">注册</a>
        </nav>
    </header>

    <section class="form-panel profile-panel">
        <div class="profile-summary">
            <img th:if="${!#strings.isEmpty(profileUser.avatarUrl)}" class="profile-avatar" th:src="@{${profileUser.avatarUrl}}" alt="">
            <span th:if="${#strings.isEmpty(profileUser.avatarUrl)}" class="profile-avatar avatar-placeholder" th:text="${#strings.substring(profileUser.nickname, 0, 1)}">U</span>
            <div>
                <h1 th:text="${profileUser.nickname}">用户昵称</h1>
                <p class="empty" th:text="${profileUser.bio}">这个用户很懒~什么都没有写~</p>
            </div>
        </div>
    </section>

    <h2 th:text="${profileUser.nickname} + '的文章'">用户的文章</h2>
    <section class="article-list" th:if="${!articlePage.empty}">
        <article class="article-item" th:each="article : ${articlePage.content}">
            <div class="article-list-row">
                <div class="article-list-main">
                    <a class="article-title" th:href="@{/articles/{id}(id=${article.id})}" th:text="${article.title}">文章标题</a>
                    <div class="meta">
                        <span th:text="${article.category.name}">分类</span>
                        <time th:text="${#temporals.format(article.createdAt, 'yyyy-MM-dd HH:mm')}">时间</time>
                    </div>
                    <div class="tag-row">
                        <a th:each="tag : ${article.tags}" th:href="@{/(tagId=${tag.id})}" th:text="${tag.name}">标签</a>
                    </div>
                </div>
                <span class="like-count"><span aria-hidden="true">&#128077;</span><span th:text="${article.likeCount}">0</span></span>
            </div>
        </article>
    </section>
    <p class="empty" th:if="${articlePage.empty}">这个用户还没有发布文章。</p>

    <nav class="pager" th:if="${articlePage.totalPages > 1}">
        <a th:if="${articlePage.hasPrevious()}" th:href="@{/users/{id}(id=${profileUser.id},page=${articlePage.number - 1})}">上一页</a>
        <span th:text="${articlePage.number + 1} + ' / ' + ${articlePage.totalPages}">1 / 1</span>
        <a th:if="${articlePage.hasNext()}" th:href="@{/users/{id}(id=${profileUser.id},page=${articlePage.number + 1})}">下一页</a>
    </nav>
</main>
</body>
</html>
